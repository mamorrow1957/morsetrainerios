name: MorseTraineriOS
options:
  bundleIdPrefix: com.michaelmorrow
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 4
    DEVELOPMENT_TEAM: ABXDYQ55HS
    CODE_SIGN_STYLE: Automatic

targets:
  MorseTraineriOS:
    type: application
    platform: iOS
    sources:
      - MorseTraineriOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelmorrow.MorseTraineriOS
        INFOPLIST_FILE: MorseTraineriOS/Info.plist
    info:
      path: MorseTraineriOS/Info.plist
      generate: false
    dependencies: []

  MorseTraineriOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MorseTraineriOSTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelmorrow.MorseTraineriOSTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MorseTraineriOS
